<!-- ===== 編輯卡片 ===== -->
  <div class="card">
    <div class="card-header card-header-flex">
      <span>
        產品資料編輯
        <button type="button" class="btn-sheet" onclick="openSheetLink('product')" title="在 Google Sheets 開啟對應工作表">Sheet</button>
      </span>
      <span data-help="productEdit"></span>
    </div>

  <div class="card-body">

    <div class="form-grid-4">

      <div class="form-group">
        <label>產品ID *</label>
        <input type="text" id="p_id">
      </div>

      <div class="form-group">
        <label>產品名稱 *</label>
        <input type="text" id="p_name">
      </div>

      <div class="form-group">
        <label>類型</label>
        <select id="p_type">
          <option value="RM">RM（原料）</option>
          <option value="WIP">WIP（半成品）</option>
          <option value="FG">FG（成品）</option>
        </select>
      </div>

      <div class="form-group">
        <label>狀態</label>
        <select id="p_status">
          <option value="ACTIVE">ACTIVE（使用中）</option>
          <option value="INACTIVE">INACTIVE（停用）</option>
        </select>
      </div>

      <div class="form-group">
        <label>規格</label>
        <input type="text" id="p_spec">
      </div>

      <div class="form-group">
        <label>單位</label>
        <select id="p_unit">
          <option value="L">L（公升）</option>
          <option value="KG">KG（公斤）</option>
          <option value="PCS">PCS（件）</option>
          <option value="PC">PC（顆）</option>
          <option value="BOX">BOX（盒）</option>
          <option value="BOTTLE">BOTTLE（瓶）</option>
        </select>
      </div>

      <div class="form-group full-width">
        <label>備註</label>
        <input type="text" id="p_remark">
      </div>

      <div class="form-group full-width">
        <details id="p_multi_unit_details" style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:8px 10px;">
          <summary style="cursor:pointer;font-weight:600;color:#475569;font-size:13px;line-height:1.35;">
            多單位換算（用途：當投料與回收單位不同，例如投料 KG、回收 BOX 時，系統會依此規則換算後再比較）
          </summary>
          <div style="margin-top:10px;color:#475569;line-height:1.6;">
            <div class="form-grid-4">
              <div class="form-group" id="p_base_unit_group">
                <label>投料單位</label>
                <select id="p_base_unit">
                  <option value="">（預設同產品單位）</option>
                  <option value="L">L（公升）</option>
                  <option value="KG">KG（公斤）</option>
                  <option value="PCS">PCS（件）</option>
                  <option value="PC">PC（顆）</option>
                  <option value="BOX">BOX（盒）</option>
                  <option value="BOTTLE">BOTTLE（瓶）</option>
                  <option value="BAG">BAG（袋）</option>
                </select>
              </div>
            </div>

            <div id="p_unit_ratio_group" style="margin-top:6px;">
              <div style="min-width:520px;">
                <input type="hidden" id="p_unit_ratio_to_base_json">
                <div class="table-wrapper" style="height:180px;">
                  <table class="data-table">
                    <thead>
                      <tr>
                        <th>產生單位</th>
                        <th>產出換算（每 1 投料單位可做出）</th>
                        <th>操作</th>
                      </tr>
                    </thead>
                    <tbody id="p_unit_ratio_rows"></tbody>
                  </table>
                </div>
                <div class="button-group" style="margin-top:8px;">
                  <button type="button" class="btn-secondary btn-sm" style="min-width:96px;" onclick="addProductUnitRatioRow()">新增換算列</button>
                </div>
              </div>
            </div>
          </div>
        </details>
      </div>

    </div>

    <div class="button-group">
      <button class="btn-primary" onclick="createProduct(this)">建立</button>
      <button class="btn-secondary" onclick="updateProduct(this)">更新</button>
      <button class="btn-secondary" onclick="clearForm()">清除</button>
      <button class="btn-secondary" onclick="openLogs('product', document.getElementById('p_id')?.value || '', 'master')">Log</button>
    </div>

  </div>
</div>


<!-- ===== 產品列表 ===== -->
<div class="card">
  <div class="card-header card-header-flex">
    <span>
      產品列表
      <button type="button" class="btn-sheet" onclick="openSheetLink('product')" title="在 Google Sheets 開啟對應工作表">Sheet</button>
    </span>
    <span data-help="productList"></span>
  </div>

  <div class="card-body">

    <!-- 搜尋一行 -->
    <div class="search-toolbar">
      <input type="text" id="search_product_keyword" placeholder="關鍵字（ID／名稱／規格／備註／換算）" style="min-width:260px;" title="比對產品ID、名稱、規格、備註、uom_config">
      <select id="search_type">
        <option value="">全部類型</option>
        <option value="RM">RM（原料）</option>
        <option value="WIP">WIP（半成品）</option>
        <option value="FG">FG（成品）</option>
      </select>
      <select id="search_status">
        <option value="">全部狀態</option>
        <option value="ACTIVE">ACTIVE（使用中）</option>
        <option value="INACTIVE">INACTIVE（停用）</option>
      </select>
      <button class="btn-secondary" onclick="resetSearch()">重設</button>
    </div>

    <br>

    <div class="table-wrapper">
      <table class="data-table">
        <thead>
        <tr>
          <th onclick="sortProducts('product_id')">ID</th>
          <th onclick="sortProducts('product_name')">名稱</th>
          <th onclick="sortProducts('type')">類型</th>
          <th onclick="sortProducts('spec')">規格</th>
          <th onclick="sortProducts('unit')">單位</th>
          <th onclick="sortProducts('status')">狀態</th>
          <th>操作</th>
        </tr>
        </thead>
        <tbody id="productTableBody"></tbody>
      </table>
    </div>

  </div>
</div>

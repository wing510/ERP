<!-- ===== Split 拆批 ===== -->
<div class="card">
  <div class="card-header card-header-flex">
    <span>
      Split 拆批
      <button type="button" class="btn-sheet" onclick="openSheetLink('lot')" title="批次主檔（lot）">Sheet</button>
    </span>
    <span data-help="splitMain"></span>
  </div>

  <div class="card-body">
    <div class="form-grid-4">
      <div class="form-group">
        <label>來源 Lot *</label>
        <select id="split_source_lot" onchange="onSelectSplitSource()"></select>
      </div>
      <div class="form-group">
        <label>產品</label>
        <input type="text" id="split_product" readonly>
      </div>
      <div class="form-group">
        <label>可用量</label>
        <input type="text" id="split_available" readonly>
      </div>
      <div class="form-group">
        <label>單位</label>
        <input type="text" id="split_unit" readonly>
      </div>
    </div>
  </div>
</div>

<div class="card">
  <div class="card-header card-header-flex">
    <span>新批次（可多筆）</span>
  </div>
  <div class="card-body">
    <div class="form-grid-4">
      <div class="form-group">
        <label>新 Lot ID *</label>
        <input type="text" id="split_new_lot_id">
      </div>
      <div class="form-group">
        <label>拆出數量 *</label>
        <input type="number" id="split_new_qty" min="0" step="0.01">
      </div>
      <div class="form-group">
        <label>單位</label>
        <input type="text" id="split_new_unit" readonly>
      </div>
      <div class="form-group full-width">
        <label>備註</label>
        <input type="text" id="split_new_remark">
      </div>
    </div>

    <div class="button-group">
      <button class="btn-primary" onclick="addSplitDraft()">新增</button>
      <button class="btn-secondary" onclick="resetSplit()">清除</button>
    </div>

    <br>

    <div class="table-wrapper">
      <table class="data-table">
        <thead>
          <tr>
            <th>#</th>
            <th>新 Lot</th>
            <th>數量</th>
            <th>單位</th>
            <th>備註</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="splitBody"></tbody>
      </table>
    </div>

    <div class="button-group" id="splitPostButtonGroup" style="margin-top:10px;">
      <button class="btn-primary" onclick="postSplit()">確認拆批（過帳）</button>
      <button type="button" class="btn-secondary" onclick="scrollToEditorTop()">回到上方</button>
    </div>
  </div>
</div>

<h2>Split 拆批製造</h2>

<div style="background:white; padding:20px; border-radius:6px; margin-bottom:20px;">

    <h3>執行拆批</h3>

    <div style="display:flex; gap:15px;">

        <select id="sp_lot" style="flex:1; padding:8px;"></select>

        <input type="number" id="sp_qty"
               placeholder="拆出數量"
               style="flex:1; padding:8px;">

        <button onclick="createSplit()"
                style="padding:8px 20px; background:#2d7ef7; color:white; border:none;">
            確認拆批
        </button>

    </div>
</div>

<div style="background:white; padding:20px; border-radius:6px;">

    <h3>拆批紀錄</h3>

    <table style="width:100%; border-collapse:collapse;">

        <thead>
            <tr style="text-align:left; border-bottom:1px solid #ddd;">
                <th>來源批次</th>
                <th>新批次</th>
                <th>數量</th>
                <th>時間</th>
            </tr>
        </thead>

        <tbody id="splitTableBody"></tbody>

    </table>

</div>

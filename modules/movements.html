<div class="card">
  <div class="card-header card-header-flex">
    <span>
      Movements 庫存異動
      <button type="button" class="btn-sheet" onclick="openSheetLink('inventory_movement')" title="在 Google Sheets 開啟對應工作表">Sheet</button>
    </span>
    <span data-help="movementsMain"></span>
  </div>

  <div class="card-body">
    <div class="mv-editor-row">
      <div class="mv-editor-fields mv-editor-fields-full mv-row-lot">
        <div class="form-group">
          <label>選擇 Lot *</label>
          <select id="mv_lot"></select>
        </div>
      </div>

      <div class="mv-editor-fields mv-editor-fields-full mv-row-meta" style="margin-top:10px;">
        <div class="form-group">
          <label>扣庫數量 *</label>
          <input type="number" id="mv_qty" placeholder="數量" min="0" step="0.01">
        </div>

        <div class="form-group">
          <label>轉倉到</label>
          <select id="mv_transfer_wh">
            <option value="">（不轉倉）</option>
          </select>
        </div>

        <div class="form-group">
          <label>用途</label>
          <select id="mv_purpose">
            <option value="INTERNAL_USE">內部領用</option>
            <option value="SAMPLE">樣品</option>
            <option value="SCRAP">報廢</option>
            <option value="OTHER">其他</option>
          </select>
        </div>

        <div class="form-group">
          <label>給誰（領用/交付）</label>
          <select id="mv_issued_to">
            <option value="">（未指定）</option>
          </select>
        </div>

        <div class="form-group" style="grid-column:1/-1;">
          <label>備註</label>
          <input type="text" id="mv_remark">
        </div>
      </div>

      <div class="button-group mv-button-group">
        <button class="btn-primary" id="mv_create_btn" onclick="createMovement(this)">確認扣庫</button>
        <button class="btn-primary" id="mv_transfer_btn" onclick="transferMovement(this)">轉倉</button>
        <button class="btn-secondary" onclick="movementsInit()">重新整理</button>
        <button class="btn-secondary" onclick="openLogs('inventory_movement','', 'inventory')">Log</button>
      </div>
    </div>

    <br>

    <div class="table-wrapper table-wrapper-tall">
      <table class="data-table">
        <thead>
          <tr>
            <th>Lot ID</th>
            <th>產品(規格)</th>
            <th>倉別</th>
            <th>異動類型</th>
            <th>數量</th>
            <th>單位</th>
            <th>時間</th>
          </tr>
        </thead>
        <tbody id="movementTableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- ===== 編輯卡片 ===== -->
<div class="card">

  <div class="card-header card-header-flex">
    <span>
      供應商資料編輯
      <button type="button" class="btn-sheet" onclick="openSheetLink('supplier')" title="在 Google Sheets 開啟對應工作表">Sheet</button>
    </span>
    <span data-help="supplierEdit"></span>
  </div>

  <div class="card-body">

    <div class="form-grid-4">

      <div class="form-group">
        <label>供應商ID *</label>
        <input type="text" id="s_id">
      </div>

      <div class="form-group">
        <label>供應商名稱 *</label>
        <input type="text" id="s_name">
      </div>

      <div class="form-group">
        <label>聯絡人</label>
        <input type="text" id="s_contact">
      </div>

      <div class="form-group">
        <label>電話</label>
        <input type="text" id="s_phone">
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="text" id="s_email">
      </div>

      <div class="form-group">
        <label>地址</label>
        <input type="text" id="s_address">
      </div>

      <div class="form-group">
        <label>國家</label>
        <input type="text" id="s_country">
      </div>

      <div class="form-group">
        <label>狀態</label>
        <select id="s_status">
          <option value="ACTIVE">ACTIVE（使用中）</option>
          <option value="INACTIVE">INACTIVE（停用）</option>
        </select>
      </div>

      <div class="form-group full-width">
        <label>備註</label>
        <input type="text" id="s_remark">
      </div>

    </div>

    <div class="button-group">
      <button class="btn-primary" onclick="createSupplier()">建立</button>
      <button class="btn-secondary" onclick="updateSupplier()">更新</button>
      <button class="btn-secondary" onclick="clearSupplierForm()">清除</button>
      <button class="btn-secondary" onclick="openLogs('supplier', document.getElementById('s_id')?.value || '', 'master')">Log</button>
    </div>

  </div>
</div>


<!-- ===== 列表 ===== -->
<div class="card">

  <div class="card-header card-header-flex">
    <span>
      供應商列表
      <button type="button" class="btn-sheet" onclick="openSheetLink('supplier')" title="在 Google Sheets 開啟對應工作表">Sheet</button>
    </span>
    <span data-help="supplierList"></span>
  </div>

  <div class="card-body">

    <!-- 搜尋 -->
    <div class="search-toolbar">
      <input type="text" id="search_supplier_keyword" placeholder="關鍵字（ID／名稱／聯絡／電話／Email）" style="min-width:260px;" title="比對供應商ID、名稱、聯絡人、電話、Email">
      <select id="search_supplier_status">
        <option value="">全部狀態</option>
        <option value="ACTIVE">ACTIVE（使用中）</option>
        <option value="INACTIVE">INACTIVE（停用）</option>
      </select>
      <button class="btn-secondary" onclick="resetSupplierSearch()">重設</button>
    </div>

    <br>

    <div class="table-wrapper">
      <table class="data-table">
        <thead>
          <tr>
            <th onclick="sortSuppliers('supplier_id')">ID <span id="sort-supplierId"></span></th>
            <th onclick="sortSuppliers('supplier_name')">名稱 <span id="sort-supplierName"></span></th>
            <th onclick="sortSuppliers('contact_person')">聯絡人 <span id="sort-contactPerson"></span></th>
            <th onclick="sortSuppliers('phone')">電話 <span id="sort-phone"></span></th>
            <th onclick="sortSuppliers('status')">狀態 <span id="sort-status"></span></th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="supplierTableBody"></tbody>
      </table>
    </div>

  </div>
</div>
